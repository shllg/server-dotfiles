# Global theme overrides
# Per-session colors are applied by tmux-colorize via hooks;
# these serve as the global fallback for any session not yet colorized.

# Status left: magenta session indicator with prefix feedback
set -g status-left "#[fg=#3b4261,bold]#{?client_prefix,#[bg=#e0af68],#[bg=#bb9af7]} #S #[bg=#292e42]#{?client_prefix,#[fg=#e0af68],#[fg=#bb9af7]}#[none]"

# Inactive windows: Tokyo Night grays with powerline arrows
set -g window-status-format "#[bg=#737aa2,fg=#292e42]#[none]#[fg=#ffffff]#I#[bg=#545c7e,fg=#737aa2]#[none]#[fg=#ffffff] #W #[bg=#292e42,fg=#545c7e]#[none]"

# Active window: magenta accent fallback (tmux-colorize overrides per-session)
set -g window-status-current-format "#[bg=#bb9af7,fg=#292e42]#[none]#[fg=#ffffff,bold] #I #W #{?pane_synchronized,✵,}#[bg=#292e42,fg=#bb9af7]#[none]"

# Status right: session context (temporary, 4s) + git branch + datetime
set -g status-right "#{?@session-context,#[fg=#a9b1d6]#{@session-context} #[fg=#565f89]│ ,}#[fg=#7aa2f7]#(~/.config/tmux/scripts/tmux-git-status #{q:pane_current_path}) #[fg=#565f89]│ #[fg=#c0caf5]%H:%M "
set -g status-right-length 120
