# -- General -------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on

# Extended keys: pass modified keys (Shift+Enter, Ctrl+Shift+K, etc.)
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# -- Prefix: Ctrl+e -----------------------------------------------------------
unbind C-b
set-option -g prefix C-e
bind-key C-e send-prefix

# -- Key bindings --------------------------------------------------------------

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window

# Direct window switching with Ctrl+number (no prefix needed)
bind-key -n C-1 select-window -t 1
bind-key -n C-2 select-window -t 2
bind-key -n C-3 select-window -t 3
bind-key -n C-4 select-window -t 4
bind-key -n C-5 select-window -t 5
bind-key -n C-6 select-window -t 6
bind-key -n C-7 select-window -t 7
bind-key -n C-8 select-window -t 8
bind-key -n C-9 select-window -t 9
bind-key -n C-0 select-window -t 10

# Direct window switching 11-20 with Alt+number (no prefix needed)
bind-key -n M-1 select-window -t 11
bind-key -n M-2 select-window -t 12
bind-key -n M-3 select-window -t 13
bind-key -n M-4 select-window -t 14
bind-key -n M-5 select-window -t 15
bind-key -n M-6 select-window -t 16
bind-key -n M-7 select-window -t 17
bind-key -n M-8 select-window -t 18
bind-key -n M-9 select-window -t 19
bind-key -n M-0 select-window -t 20

# Direct pane switching with Ctrl+Alt+number (no prefix needed)
bind-key -n C-M-1 select-pane -t 1
bind-key -n C-M-2 select-pane -t 2
bind-key -n C-M-3 select-pane -t 3
bind-key -n C-M-4 select-pane -t 4
bind-key -n C-M-5 select-pane -t 5
bind-key -n C-M-6 select-pane -t 6
bind-key -n C-M-7 select-pane -t 7
bind-key -n C-M-8 select-pane -t 8
bind-key -n C-M-9 select-pane -t 9

# Smart Ctrl+hjkl: navigates vim splits AND tmux panes seamlessly
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Copy-mode navigation
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Ctrl+Alt+hjkl as explicit fallback (always tmux pane, ignores vim)
bind-key -n C-M-h select-pane -L
bind-key -n C-M-j select-pane -D
bind-key -n C-M-k select-pane -U
bind-key -n C-M-l select-pane -R

# PageUp/PageDown scrolling — pass through to vim, otherwise enter copy-mode
bind-key -n PPage if-shell "$is_vim" 'send-keys PPage' 'copy-mode -eu'
bind-key -n NPage if-shell "$is_vim" 'send-keys NPage' ''
bind-key -T copy-mode-vi PPage send-keys -X page-up
bind-key -T copy-mode-vi NPage send-keys -X page-down

# Kill current session (Shift+X, with confirmation)
bind-key X confirm-before -p "Kill session #S? (y/n)" kill-session

# -- Popup workflows -----------------------------------------------------------
# prefix+g: lazygit in current directory
bind-key g display-popup -E -w 90% -h 90% -d '#{pane_current_path}' "lazygit"
# prefix+a: quick Claude Code question
bind-key a display-popup -E -w 90% -h 85% -d '#{pane_current_path}' "claude"
# prefix+/: cheat.sh lookup
bind-key / display-popup -E -w 80% -h 70% "read -p 'cht.sh> ' query && curl -s cht.sh/\$query | less -R"

# -- Status bar ----------------------------------------------------------------
set -g status-position bottom

# -- Theme: Tokyo Night colors -------------------------------------------------
set -g status-style "bg=#292e42,fg=#c0caf5"
set -g message-style "bg=#292e42,fg=#c0caf5"
set -g message-command-style "bg=#292e42,fg=#c0caf5"

# Source theme overrides
source-file -q ~/.config/tmux/theme-overrides.conf

# -- Pane styling --------------------------------------------------------------
set -g pane-border-lines heavy
set -g pane-border-indicators colour
set -g pane-border-status top

# Dim inactive panes slightly
setw -g window-style 'fg=colour245,bg=#0a0a0a'
setw -g window-active-style 'fg=colour252,bg=#0d0d0d'

# Per-session color theming: auto-apply on session create and switch
set-hook -g session-created 'run-shell "~/.config/tmux/scripts/tmux-colorize #{q:session_name}"'
set-hook -g client-session-changed 'run-shell "~/.config/tmux/scripts/tmux-colorize #{q:session_name}"'

# Session context: show git branch + last commit on session switch
set-hook -ga client-session-changed 'run-shell "~/.config/tmux/scripts/tmux-session-context #{q:session_name} #{q:pane_current_path}"'

# -- TPM (install: git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
run -b '~/.config/tmux/plugins/tpm/tpm'

# Server-specific overrides (not managed by stow)
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
